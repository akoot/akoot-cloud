<!DOCTYPE html>
<html lang="en">
<body>
<h2>Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<span>or</span>

<h2>Register</h2>

<input id="r_user" placeholder="Username"><br>
<input id="r_pass" type="password" placeholder="Password"><br>
<input id="r_token" placeholder="XXXX-XXXX-XXXX-XXXX"><br>

<button onclick="register()">Register</button>

<p id="out"></p>
<script>
    const tokenInput = document.getElementById("r_token");

    tokenInput.addEventListener("input", () => {
        let value = tokenInput.value.toUpperCase();

        // remove everything except letters
        value = value.replace(/[^A-Z]/g, "");

        // avoid longer inputs
        if (value.length > 16) value = value.slice(0, 16);

        // split into chunks of 4
        let parts = value.match(/.{1,4}/g) || [];

        // limit to 4 parts
        parts = parts.slice(0, 4);

        tokenInput.value = parts.join("-");
    });
</script>
<script>
    let accessToken = null;

    async function login() {
        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: user.value,
                password: pass.value
            })
        });

        const data = await res.json();
        if (data.accessToken) {
            accessToken = data.accessToken;
            localStorage.setItem("accessToken", accessToken);
            window.location.href = "/drive";
        } else {
            out.innerText = JSON.stringify(data);
        }
    }

    async function register() {
        const res = await fetch("/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: r_user.value,
                password: r_pass.value,
                token: r_token.value.toUpperCase()
            })
        });

        out.innerText = JSON.stringify(await res.json());
    }

    // auto redirect if already logged in
    (async () => {
        let token = localStorage.getItem("accessToken");
        if (!token) return;

        const res = await fetch("/me", {
            headers: { "Authorization": "Bearer " + token }
        });

        if (res.status === 200) {
            window.location.href = "/drive";
        }
    })();
</script>
</body>
</html>
